<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Transparent background -->

  <!-- Shoulders — white fill, black outline -->
  <path d="M 1 80 C 1 61 15 51 32 51 C 49 51 63 61 63 80 Z"
        fill="#ffffff" stroke="#000000" stroke-width="2" stroke-linejoin="round"/>
  <!-- Head — white fill, black outline -->
  <circle cx="32" cy="32" r="16" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="25" cy="30" r="2" fill="#000000"/>
  <circle cx="39" cy="30" r="2" fill="#000000"/>

  <!-- Scan-corner brackets — square caps, extend exactly to image edges -->
  <path d="M 2 2 v 12 M 2 2 h 12"   stroke="#4a9eff" stroke-width="4" stroke-linecap="square" fill="none"/>
  <path d="M 62 2 v 12 M 62 2 h -12" stroke="#4a9eff" stroke-width="4" stroke-linecap="square" fill="none"/>
  <path d="M 2 62 v -12 M 2 62 h 12"  stroke="#4a9eff" stroke-width="4" stroke-linecap="square" fill="none"/>
  <path d="M 62 62 v -12 M 62 62 h -12" stroke="#4a9eff" stroke-width="4" stroke-linecap="square" fill="none"/>
</svg>
